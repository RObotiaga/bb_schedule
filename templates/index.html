{% extends "base.html" %}

{% block title %}USURT Mini App{% endblock %}

{% block content %}
<div class="app-shell">
    {% if error %}
    <div class="alert alert-danger" role="alert">{{ error }}</div>
    {% endif %}

    <div class="app-hero mb-4">
        <div>
            <h1 class="app-title">Расписание УрГУПС</h1>
            <div class="app-subtitle" id="profileLine">Загрузка профиля...</div>
        </div>
        <button class="btn btn-outline-secondary btn-sm" id="refreshBtn" type="button">Обновить</button>
    </div>

    <ul class="nav nav-tabs flex-nowrap overflow-auto mb-3" id="mainTabs" role="tablist">
        <li class="nav-item"><button class="nav-link active" data-bs-toggle="tab" data-bs-target="#scheduleTab" type="button">Расписание</button></li>
        <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#teachersTab" type="button">Преподаватели</button></li>
        <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#sessionTab" type="button">Сессия</button></li>
        <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#ratingTab" type="button">Рейтинг</button></li>
        <li class="nav-item d-none" id="adminTabBtn"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#adminTab" type="button">Админ</button></li>
    </ul>

    <div class="tab-content">
        <section class="tab-pane fade show active" id="scheduleTab">
            <form class="row g-2 align-items-end mb-4 apple-panel" id="groupForm">
                <div class="col-12 col-md-4">
                    <label class="form-label" for="facultySelect">Факультет</label>
                    <select class="form-select" id="facultySelect"></select>
                </div>
                <div class="col-6 col-md-3">
                    <label class="form-label" for="courseSelect">Курс</label>
                    <select class="form-select" id="courseSelect" disabled></select>
                </div>
                <div class="col-6 col-md-3">
                    <label class="form-label" for="groupSelect">Группа</label>
                    <select class="form-select" id="groupSelect" disabled></select>
                </div>
                <div class="col-12 col-md-2 d-grid">
                    <button class="btn btn-primary" type="submit">Показать</button>
                </div>
            </form>
            <div class="d-flex flex-wrap gap-2 mb-4" id="dayButtons">
                <button class="btn btn-primary" data-all-days="true" type="button">Все дни</button>
                <button class="btn btn-outline-primary" data-offset="0" type="button">Сегодня</button>
                <button class="btn btn-outline-primary" data-offset="1" type="button">Завтра</button>
                <button class="btn btn-outline-primary" data-offset="2" type="button">+2</button>
                <button class="btn btn-outline-primary" data-offset="3" type="button">+3</button>
                <button class="btn btn-outline-primary" data-offset="4" type="button">+4</button>
                <button class="btn btn-outline-primary" data-offset="5" type="button">+5</button>
            </div>
            <div id="scheduleView"></div>
        </section>

        <section class="tab-pane fade" id="teachersTab">
            <form class="input-group mb-3" id="teacherSearchForm">
                <input class="form-control" id="teacherQuery" placeholder="Фамилия преподавателя" autocomplete="off">
                <button class="btn btn-primary" type="submit">Найти</button>
            </form>
            <div class="list-group mb-3" id="teacherMatches"></div>
            <div class="d-flex gap-2 mb-3">
                <button class="btn btn-outline-secondary btn-sm" id="teacherPrev" type="button">Пред. день</button>
                <button class="btn btn-outline-secondary btn-sm" id="teacherNext" type="button">След. день</button>
                <button class="btn btn-outline-primary btn-sm ms-auto" id="teacherSubscribe" type="button" disabled>Подписка</button>
            </div>
            <div id="teacherScheduleView"></div>
        </section>

        <section class="tab-pane fade" id="sessionTab">
            <form class="input-group mb-3" id="recordBookForm">
                <input class="form-control" id="recordBookInput" inputmode="numeric" placeholder="Номер зачётной книжки">
                <button class="btn btn-primary" type="submit">Показать</button>
                <button class="btn btn-outline-secondary" id="refreshSessionBtn" type="button">Обновить</button>
            </form>
            <div class="row g-2 mb-3" id="settingsBox"></div>
            <div id="sessionView"></div>
            <div id="noteEditor" class="mt-3 d-none">
                <h2 class="h6" id="noteSubject"></h2>
                <textarea class="form-control mb-2" id="noteText" rows="3" placeholder="Заметка"></textarea>
                <div class="input-group mb-2">
                    <input class="form-control" id="checkText" placeholder="Новый пункт чек-листа">
                    <button class="btn btn-outline-primary" id="addCheckBtn" type="button">Добавить</button>
                </div>
                <div id="checkList"></div>
                <button class="btn btn-primary mt-2" id="saveNoteBtn" type="button">Сохранить заметку</button>
            </div>
        </section>

        <section class="tab-pane fade" id="ratingTab">
            <button class="btn btn-primary btn-sm mb-3" id="loadRatingBtn" type="button">Загрузить рейтинг группы</button>
            <form class="input-group mb-3" id="subjectSearchForm">
                <input class="form-control" id="subjectQuery" placeholder="Поиск предмета">
                <button class="btn btn-outline-primary" type="submit">Найти</button>
            </form>
            <div id="ratingView"></div>
            <div class="list-group" id="subjectView"></div>
        </section>

        <section class="tab-pane fade" id="adminTab">
            <div class="d-flex flex-wrap gap-2 mb-3">
                <button class="btn btn-outline-primary btn-sm" data-admin-job="schedule_sync" type="button">Обновить расписание</button>
                <button class="btn btn-outline-primary btn-sm" data-admin-job="reload_structure" type="button">Перезагрузить структуру</button>
                <button class="btn btn-outline-primary btn-sm" data-admin-job="rating_update" type="button">Обновить рейтинг</button>
                <button class="btn btn-outline-secondary btn-sm" id="adminStatusBtn" type="button">Статус</button>
                <button class="btn btn-outline-secondary btn-sm" id="adminExportBtn" type="button">Экспорт рейтинга</button>
                <button class="btn btn-outline-secondary btn-sm" id="adminExpelledBtn" type="button">Отчисления</button>
            </div>
            <div class="row g-2 mb-3">
                <form class="col-12 col-md-6" id="ratingImportForm">
                    <label class="form-label" for="ratingImportFile">Импорт рейтинга (.json/.gz)</label>
                    <div class="input-group">
                        <input class="form-control" id="ratingImportFile" type="file" accept=".json,.gz">
                        <button class="btn btn-outline-primary" type="submit">Импорт</button>
                    </div>
                </form>
                <form class="col-12 col-md-6" id="dbImportForm">
                    <label class="form-label" for="dbImportFile">Загрузить БД (.db)</label>
                    <div class="input-group">
                        <input class="form-control" id="dbImportFile" type="file" accept=".db">
                        <button class="btn btn-outline-primary" type="submit">Загрузить</button>
                    </div>
                </form>
            </div>
            <form class="mb-3" id="broadcastForm">
                <label class="form-label" for="broadcastText">Рассылка</label>
                <textarea class="form-control mb-2" id="broadcastText" rows="3"></textarea>
                <input class="form-control mb-2" id="broadcastFile" type="file">
                <button class="btn btn-primary btn-sm" type="submit">Отправить рассылку</button>
            </form>
            <form class="row g-2 mb-3" id="adminGroupForm">
                <div class="col">
                    <input class="form-control" id="adminGroupInput" placeholder="Группа для статистики">
                </div>
                <div class="col-auto">
                    <button class="btn btn-outline-primary" type="submit">Открыть</button>
                </div>
            </form>
            <pre class="bg-light p-3 rounded small" id="adminOutput"></pre>
        </section>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
const tg = window.Telegram?.WebApp;
if (tg) tg.expand();

const state = {
    initData: tg?.initData || "",
    me: null,
    group: null,
    dayOffset: null,
    teacher: null,
    teacherOffset: 0,
    currentNoteSubject: null,
    currentChecklist: [],
    currentNoteText: "",
};

const authHeaders = () => state.initData ? {"X-Telegram-Init-Data": state.initData} : {};
const api = async (url, options = {}) => {
    const headers = {...authHeaders(), ...(options.headers || {})};
    const response = await fetch(url, {...options, headers});
    if (!response.ok) {
        const text = await response.text();
        throw new Error(text || response.statusText);
    }
    const type = response.headers.get("content-type") || "";
    return type.includes("application/json") ? response.json() : response.text();
};
const esc = (value) => String(value ?? "").replace(/[&<>"']/g, ch => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[ch]));
const setHtml = (id, html) => document.getElementById(id).innerHTML = html;
const printAdmin = (data) => document.getElementById("adminOutput").textContent = JSON.stringify(data, null, 2);

function updateDayButtons() {
    document.querySelectorAll("#dayButtons button").forEach(button => {
        const isAll = button.dataset.allDays === "true";
        const isActive = isAll ? state.dayOffset === null : Number(button.dataset.offset) === state.dayOffset;
        button.classList.toggle("btn-primary", isActive);
        button.classList.toggle("btn-outline-primary", !isActive);
    });
}

function renderSchedule(data) {
    state.group = data.group || state.group;
    if (!data.days?.length) {
        setHtml("scheduleView", `<div class="alert alert-warning">Расписание не найдено.</div>`);
        return;
    }
    const totalLessons = data.days.reduce((sum, day) => sum + (day.lessons?.length || 0), 0);
    setHtml("scheduleView", data.days.map(day => `
        <section class="schedule-day mb-4">
            <div class="d-flex justify-content-between align-items-center border-bottom pb-2 mb-2">
                <h2 class="schedule-date">${esc(day.date_display)}</h2>
                <span class="badge text-bg-secondary">${esc(day.week_type || "")}</span>
            </div>
            ${day.lessons.map(lesson => `
                <div class="lesson-row py-2 border-bottom">
                    <div class="fw-semibold text-primary">${esc(lesson.time)} ${lesson.is_subscription ? '<span class="badge text-bg-info">подписка</span>' : ""}</div>
                    <div>${esc(lesson.subject)}</div>
                    <div class="small text-muted">${esc(lesson.teacher || "Не указан")} · ${esc(lesson.location || "")}${lesson.group_name && lesson.group_name !== data.group ? " · " + esc(lesson.group_name) : ""}</div>
                </div>
            `).join("")}
        </section>
    `).join("") + `<div class="text-muted small text-center mt-4">Показано дней: ${data.days.length}, занятий: ${totalLessons}</div>`);
}

async function loadSchedule(dayOffset = null) {
    state.dayOffset = dayOffset;
    updateDayButtons();
    if (!state.group) {
        setHtml("scheduleView", `<div class="alert alert-info">Выберите факультет, курс и группу, чтобы открыть расписание.</div>`);
        return;
    }
    const params = new URLSearchParams();
    if (state.group) params.set("group", state.group);
    if (dayOffset !== null && dayOffset !== undefined) params.set("day_offset", dayOffset);
    try {
        renderSchedule(await api(`/api/schedule?${params}`));
    } catch (error) {
        setHtml("scheduleView", `<div class="alert alert-danger">Не удалось загрузить расписание.</div>`);
    }
}

async function loadFaculties() {
    const faculties = await api("/api/faculties");
    const facultySelect = document.getElementById("facultySelect");
    facultySelect.innerHTML = `<option value="">Факультет...</option>` + faculties.map(f => `<option>${esc(f)}</option>`).join("");
}

async function loadMe() {
    if (!state.initData) {
        document.getElementById("profileLine").textContent = "Открыто вне Telegram: доступен публичный выбор группы.";
        return;
    }
    try {
        const data = await api("/api/me");
        state.me = data;
        state.group = data.group;
        document.getElementById("profileLine").textContent = `${data.user.first_name || data.user.username || data.user.id}${data.group ? " · " + data.group : ""}`;
        document.getElementById("recordBookInput").value = data.record_book || "";
        renderSettings(data.settings || {});
        if (data.is_admin) document.getElementById("adminTabBtn").classList.remove("d-none");
    } catch (error) {
        document.getElementById("profileLine").textContent = "Не удалось проверить Telegram-профиль.";
    }
}

function renderSettings(settings) {
    const labels = {
        hide_5: "Скрыть 5",
        hide_4: "Скрыть 4",
        hide_3: "Скрыть 3",
        hide_2: "Скрыть 2",
        hide_passed_non_exam: "Скрыть зачёты",
        hide_failed: "Скрыть долги",
    };
    setHtml("settingsBox", Object.entries(labels).map(([key, label]) => `
        <label class="col-6 col-md-4 small">
            <input class="form-check-input session-setting" type="checkbox" data-key="${key}" ${settings[key] ? "checked" : ""}> ${label}
        </label>
    `).join(""));
}

function renderSession(data) {
    const summary = data.summary;
    if (!summary) {
        setHtml("sessionView", `<div class="alert alert-warning">Результаты не найдены.</div>`);
        return;
    }
    const rows = data.results.map(item => `
        <button class="list-group-item list-group-item-action" data-note-subject="${esc(item.subject)}">
            <div class="d-flex justify-content-between gap-2">
                <span>${esc(item.subject)}</span>
                <span class="${item.passed ? "text-success" : "text-danger"}">${esc(item.grade)}</span>
            </div>
            <div class="small text-muted">${esc(item.semester || "")}${item.date ? " · " + esc(item.date) : ""}</div>
        </button>
    `).join("");
    setHtml("sessionView", `
        <div class="alert alert-info">Закрыто: ${summary.passed}/${summary.total} (${summary.pass_rate}%), долгов: ${summary.debts}</div>
        <div class="list-group">${rows}</div>
    `);
}

async function openNote(subject) {
    state.currentNoteSubject = subject;
    const note = await api(`/api/session/notes?subject=${encodeURIComponent(subject)}`);
    state.currentChecklist = note.checklist || [];
    state.currentNoteText = note.note_text || "";
    document.getElementById("noteEditor").classList.remove("d-none");
    document.getElementById("noteSubject").textContent = subject;
    document.getElementById("noteText").value = state.currentNoteText;
    renderChecklist();
}

function renderChecklist() {
    setHtml("checkList", state.currentChecklist.map((item, idx) => `
        <div class="d-flex align-items-center gap-2 py-1">
            <button class="btn btn-sm ${item.done ? "btn-success" : "btn-outline-secondary"}" data-check-toggle="${idx}" type="button">${item.done ? "Готово" : "Пункт"}</button>
            <span class="flex-grow-1">${esc(item.text)}</span>
            <button class="btn btn-sm btn-outline-danger" data-check-delete="${idx}" type="button">Удалить</button>
        </div>
    `).join(""));
}

async function loadTeacherSchedule() {
    if (!state.teacher) return;
    const data = await api(`/api/teachers/${encodeURIComponent(state.teacher)}/schedule?day_offset=${state.teacherOffset}`);
    document.getElementById("teacherSubscribe").disabled = false;
    document.getElementById("teacherSubscribe").textContent = data.is_subscribed ? "Отписаться" : "Подписаться";
    setHtml("teacherScheduleView", `
        <h2 class="h6">${esc(data.teacher)} · ${esc(data.date_display)}</h2>
        ${data.lessons.length ? data.lessons.map(lesson => `
            <div class="py-2 border-bottom">
                <div class="fw-semibold text-primary">${esc(lesson.time)} · ${esc((lesson.groups || []).join(", "))}</div>
                <div>${esc(lesson.subject)}</div>
                <div class="small text-muted">${esc(lesson.location)}</div>
            </div>
        `).join("") : '<div class="alert alert-warning">Расписание отсутствует.</div>'}
    `);
}

document.addEventListener("DOMContentLoaded", async () => {
    await loadFaculties();
    await loadMe();
    await loadSchedule(null);

    document.getElementById("refreshBtn").addEventListener("click", () => { loadMe(); loadSchedule(state.dayOffset); });
    document.getElementById("dayButtons").addEventListener("click", event => {
        const allButton = event.target.closest("button[data-all-days]");
        if (allButton) {
            loadSchedule(null);
            return;
        }
        const button = event.target.closest("button[data-offset]");
        if (button) loadSchedule(Number(button.dataset.offset));
    });

    document.getElementById("facultySelect").addEventListener("change", async event => {
        const faculty = event.target.value;
        const courseSelect = document.getElementById("courseSelect");
        const groupSelect = document.getElementById("groupSelect");
        groupSelect.disabled = true;
        groupSelect.innerHTML = "";
        if (!faculty) return;
        const courses = await api(`/api/courses/${encodeURIComponent(faculty)}`);
        courseSelect.innerHTML = `<option value="">Курс...</option>` + courses.map(c => `<option>${esc(c)}</option>`).join("");
        courseSelect.disabled = false;
    });

    document.getElementById("courseSelect").addEventListener("change", async event => {
        const faculty = document.getElementById("facultySelect").value;
        const groups = await api(`/api/groups/${encodeURIComponent(faculty)}/${encodeURIComponent(event.target.value)}`);
        const groupSelect = document.getElementById("groupSelect");
        groupSelect.innerHTML = `<option value="">Группа...</option>` + groups.map(g => `<option>${esc(g)}</option>`).join("");
        groupSelect.disabled = false;
    });

    document.getElementById("groupForm").addEventListener("submit", async event => {
        event.preventDefault();
        const group = document.getElementById("groupSelect").value;
        if (!group) return;
        state.group = group;
        if (state.initData) await api("/api/me/group", {method: "POST", headers: {"Content-Type": "application/json"}, body: JSON.stringify({group})});
        await loadSchedule(null);
    });

    document.getElementById("teacherSearchForm").addEventListener("submit", async event => {
        event.preventDefault();
        const q = document.getElementById("teacherQuery").value;
        const data = await api(`/api/teachers/search?q=${encodeURIComponent(q)}`);
        setHtml("teacherMatches", data.teachers.map(t => `<button class="list-group-item list-group-item-action" data-teacher="${esc(t)}">${esc(t)}</button>`).join(""));
    });
    document.getElementById("teacherMatches").addEventListener("click", event => {
        const button = event.target.closest("[data-teacher]");
        if (!button) return;
        state.teacher = button.dataset.teacher;
        state.teacherOffset = 0;
        loadTeacherSchedule();
    });
    document.getElementById("teacherPrev").addEventListener("click", () => { state.teacherOffset -= 1; loadTeacherSchedule(); });
    document.getElementById("teacherNext").addEventListener("click", () => { state.teacherOffset += 1; loadTeacherSchedule(); });
    document.getElementById("teacherSubscribe").addEventListener("click", async event => {
        const subscribed = event.target.textContent !== "Отписаться";
        await api(`/api/teachers/${encodeURIComponent(state.teacher)}/subscribe`, {method: "POST", headers: {"Content-Type": "application/json"}, body: JSON.stringify({subscribed})});
        await loadTeacherSchedule();
    });

    document.getElementById("recordBookForm").addEventListener("submit", async event => {
        event.preventDefault();
        const record_book = document.getElementById("recordBookInput").value;
        renderSession(await api("/api/session/results", {method: "POST", headers: {"Content-Type": "application/json"}, body: JSON.stringify({record_book})}));
    });
    document.getElementById("refreshSessionBtn").addEventListener("click", async () => renderSession(await api("/api/session/results?refresh=true")));
    document.getElementById("settingsBox").addEventListener("change", async () => {
        const settings = Object.fromEntries([...document.querySelectorAll(".session-setting")].map(input => [input.dataset.key, input.checked]));
        await api("/api/me/settings", {method: "POST", headers: {"Content-Type": "application/json"}, body: JSON.stringify({settings})});
        try { renderSession(await api("/api/session/results")); } catch (_) {}
    });
    document.getElementById("sessionView").addEventListener("click", event => {
        const button = event.target.closest("[data-note-subject]");
        if (button) openNote(button.dataset.noteSubject);
    });
    document.getElementById("saveNoteBtn").addEventListener("click", async () => {
        const note = await api("/api/session/notes", {method: "POST", headers: {"Content-Type": "application/json"}, body: JSON.stringify({subject: state.currentNoteSubject, note_text: document.getElementById("noteText").value, checklist: state.currentChecklist})});
        state.currentChecklist = note.checklist || [];
        renderChecklist();
    });
    document.getElementById("addCheckBtn").addEventListener("click", async () => {
        const text = document.getElementById("checkText").value;
        const note = await api("/api/session/notes/checklist", {method: "POST", headers: {"Content-Type": "application/json"}, body: JSON.stringify({subject: state.currentNoteSubject, action: "add", text})});
        state.currentChecklist = note.checklist || [];
        document.getElementById("checkText").value = "";
        renderChecklist();
    });
    document.getElementById("checkList").addEventListener("click", async event => {
        const toggle = event.target.closest("[data-check-toggle]");
        const del = event.target.closest("[data-check-delete]");
        const index = Number((toggle || del)?.dataset.checkToggle ?? (toggle || del)?.dataset.checkDelete);
        if (!Number.isInteger(index)) return;
        const action = toggle ? "toggle" : "delete";
        const note = await api("/api/session/notes/checklist", {method: "POST", headers: {"Content-Type": "application/json"}, body: JSON.stringify({subject: state.currentNoteSubject, action, index})});
        state.currentChecklist = note.checklist || [];
        renderChecklist();
    });

    document.getElementById("loadRatingBtn").addEventListener("click", async () => {
        const data = await api("/api/rating/group");
        setHtml("ratingView", `<div class="list-group mb-3">${data.students.map(s => `<div class="list-group-item ${s.is_current ? "active" : ""}">${s.position}. ${esc(s.record_book)} — ${s.passed}/${s.total} (${s.pass_rate}%)</div>`).join("")}</div>`);
    });
    document.getElementById("subjectSearchForm").addEventListener("submit", async event => {
        event.preventDefault();
        const q = document.getElementById("subjectQuery").value;
        const data = await api(`/api/subjects?q=${encodeURIComponent(q)}`);
        setHtml("subjectView", data.subjects.map(s => `<button class="list-group-item list-group-item-action" data-subject="${esc(s)}">${esc(s)}</button>`).join(""));
    });
    document.getElementById("subjectView").addEventListener("click", async event => {
        const button = event.target.closest("[data-subject]");
        if (!button) return;
        const data = await api(`/api/subjects/${encodeURIComponent(button.dataset.subject)}/stats`);
        button.innerHTML = `${esc(data.subject)}<div class="small text-muted">Закрываемость: ${data.stats.person_pass_rate}% (${data.stats.passed_persons}/${data.stats.total_persons})</div>`;
    });

    document.querySelectorAll("[data-admin-job]").forEach(button => button.addEventListener("click", async () => printAdmin(await api(`/api/admin/jobs/${button.dataset.adminJob}/start`, {method: "POST"}))));
    document.getElementById("adminStatusBtn").addEventListener("click", async () => printAdmin(await api("/api/admin/status")));
    document.getElementById("adminExpelledBtn").addEventListener("click", async () => printAdmin(await api("/api/admin/expelled")));
    document.getElementById("adminExportBtn").addEventListener("click", async () => {
        const response = await fetch("/api/admin/rating/export", {headers: authHeaders()});
        if (!response.ok) throw new Error(await response.text());
        const blob = await response.blob();
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = "rating_export.json.gz";
        link.click();
        URL.revokeObjectURL(url);
    });
    document.getElementById("ratingImportForm").addEventListener("submit", async event => {
        event.preventDefault();
        const file = document.getElementById("ratingImportFile").files[0];
        if (!file) return;
        const form = new FormData();
        form.append("file", file);
        printAdmin(await api("/api/admin/rating/import", {method: "POST", body: form}));
    });
    document.getElementById("dbImportForm").addEventListener("submit", async event => {
        event.preventDefault();
        const file = document.getElementById("dbImportFile").files[0];
        if (!file) return;
        const form = new FormData();
        form.append("file", file);
        printAdmin(await api("/api/admin/db/import", {method: "POST", body: form}));
    });
    document.getElementById("broadcastForm").addEventListener("submit", async event => {
        event.preventDefault();
        const form = new FormData();
        form.append("text", document.getElementById("broadcastText").value);
        const file = document.getElementById("broadcastFile").files[0];
        if (file) form.append("file", file);
        printAdmin(await api("/api/admin/broadcast", {method: "POST", body: form}));
    });
    document.getElementById("adminGroupForm").addEventListener("submit", async event => {
        event.preventDefault();
        printAdmin(await api(`/api/admin/group/${encodeURIComponent(document.getElementById("adminGroupInput").value)}`));
    });
});
</script>
{% endblock %}
